name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.4.x"
      - uses: extractions/setup-just@v2
      - name: Run lint
        run: just lint

  test:
    strategy:
      matrix:
        python-version: ["3.13"]
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.4.x"
      - uses: extractions/setup-just@v2
      - name: Run tests
        run: just test
